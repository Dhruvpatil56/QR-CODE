name: CICD Pipeline 

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: self-hosted

    env:
      DOCKERHUB_USERNAME: dhruvpatil56
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------- SonarQube ----------
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          projectBaseDir: api
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      # ---------- Trivy ----------
      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install wget apt-transport-https gnupg lsb-release -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Run Trivy Scan
        run: trivy fs . --exit-code 0 --format table --output trivy-report.txt

      # ---------- Docker Login ----------
      - name: Login to DockerHub
        run: echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u $DOCKERHUB_USERNAME --password-stdin

      # ---------- Backend Build ----------
      - name: Build and Push Backend Docker Image
        run: |
          docker build -f api/Dockerfile -t $DOCKERHUB_USERNAME/qr-backend:$IMAGE_TAG ./api
          docker push $DOCKERHUB_USERNAME/qr-backend:$IMAGE_TAG

      # ---------- Frontend Build ----------
      - name: Build and Push Frontend Docker Image
        run: |
          docker build -f front-end-nextjs/Dockerfile -t $DOCKERHUB_USERNAME/qr-frontend:$IMAGE_TAG ./front-end-nextjs
          docker push $DOCKERHUB_USERNAME/qr-frontend:$IMAGE_TAG

      # ---------- GitOps: Update K8s ----------
      - name: Update Kubernetes Manifests
        run: |
          sed -i "s|image: dhruvpatil56/qr-backend:.*|image: dhruvpatil56/qr-backend:${IMAGE_TAG}|g" k8s/backend-deployment.yaml
          sed -i "s|image: dhruvpatil56/qr-frontend:.*|image: dhruvpatil56/qr-frontend:${IMAGE_TAG}|g" k8s/frontend-deployment.yaml

      # ---------- Commit & Push using GitHub Token ----------
      - name: Commit and Push Changes
        run: |
          git config --global user.name "dhruvpatil56"
          git config --global user.email "dhruvpatil56@gmail.com"

          git add k8s/
          git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commit"

          git remote set-url origin https://x-access-token:${{ secrets.TOKEN }}@github.com/dhruvpatil56/${{ github.event.repository.name }}.git
          git push origin main
